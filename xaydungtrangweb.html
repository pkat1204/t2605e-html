<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employment Separation Form</title>
    <link rel="stylesheet" href="css/web.css">
</head>
<body>

<div class="header">
    Employment Separation Form
</div>

<form class="form-container">

    <div class="form-group">
        <label>Full Name</label>
        <div class="name-row">
            <div class="field">
                <input type="text">
                <span class="sub-label">First Name</span>
            </div>

            <div class="field">
                <input type="text">
                <span class="sub-label">Last Name</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Employee ID</label>
        <input type="text">
    </div>

    <div class="form-group">
        <label>Personal Email</label>
        <input type="email">
    </div>

    <div class="form-group">
        <label>Last Working Date</label>
        <input class="short-input" type="date">
        <span class="hint">dd-MMM-yyyy</span>
    </div>

    <div class="form-group">
        <label>Reason for Departure</label>
        <input type="text">
    </div>

    <div class="form-group">
        <label>Return of All Company Property</label>

        <div class="radio-option">
            <input type="radio" name="property"> Yes
        </div>

        <div class="radio-option">
            <input type="radio" name="property"> No
        </div>

        <div class="radio-option">
            <input type="radio" name="property"> Other
        </div>
    </div>

    <div class="form-group">
        <label>Exit Interview Schedule</label>
        <input class="short-input" type="datetime-local">
        <span class="hint">dd-MMM-yyyy HH:mm AM/PM</span>
    </div>

    <div class="form-group">
        <label>Comments / Feedback</label>
        <textarea></textarea>
    </div>

    <div class="submit-container">
        <button type="submit">Submit</button>
    </div>

</form>

</body>
</html>
